<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MicroTrend Tracker</title>
  <link rel="stylesheet" href="/static/css/styles.css?v=5"/>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────── -->
<nav>
  <div class="container inner">
    <div class="brand">📊 Micro<span>Trend</span></div>

    <!-- Global search -->
    <div class="global-search-wrap">
      <input id="global-search" type="text" placeholder="🔍 Search any company or ticker…" autocomplete="off"/>
      <div id="global-suggestions" class="suggestions-dropdown"></div>
    </div>

    <div class="nav-actions">
      <span style="font-size:0.82rem;color:var(--muted)">
        Hi, <strong id="nav-username" style="color:var(--text)">…</strong>
      </span>
      <button class="btn btn-ghost" id="logout-btn">Logout</button>
    </div>
  </div>
</nav>

<!-- ── Main ───────────────────────────────────────────────────── -->
<main>
  <div class="container">

    <!-- Header row -->
    <div class="dash-header">
      <div>
        <h2 id="section-title">Latest Insights</h2>
        <p id="section-sub" style="color:var(--muted);font-size:0.85rem;margin-top:0.2rem">
          AI-summarised articles — click Refresh to fetch latest
        </p>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap">
        <div class="stat-pill"><strong id="insight-count">–</strong> <span id="count-label">items</span></div>
        <button class="btn btn-primary" id="fetch-btn">↻ Refresh</button>
      </div>
    </div>

    <!-- Tab bar: sectors + divider + Stocks + Favorites -->
    <div class="sector-tabs" id="sector-tabs">
      <button class="sector-tab active" data-sector="All" onclick="switchTab('All',this)">🌐 All</button>
      <!-- sector tabs injected by JS here -->
      <div class="tab-divider"></div>
      <button class="sector-tab stocks-tab" data-sector="Stocks" onclick="switchTab('Stocks',this)">📈 Stocks</button>
      <button class="sector-tab fav-tab"    data-sector="Favorites" onclick="switchTab('Favorites',this)">⭐ Favorites</button>
    </div>

    <!-- Content -->
    <div id="main-content">
      <div class="empty-state"><div class="spinner"></div></div>
    </div>

  </div>
</main>

<div id="toast"></div>

<script src="/static/js/auth.js?v=5"></script>
<script src="/static/js/app.js?v=5"></script>
</body>
</html>
